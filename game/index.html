<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Territory</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script defer>

        //creates rows x columns filled with changeable tiles
        window.onload = () => {
            for (let i = 0; i < 16; i++) {
                let row = $("<div>", {class: "row"});
                for (let j = 0; j < 16; j++) {
                    let img = $("<img>", {
                        class: "img",
                        src: "sprites/black.png",
                    }).on("click", function() {changeSprite(this)});
                    row.append(img);
                }
                $("#game").append(row);
            }
        }

        //changePlayer automatically increases the player by 1, and I have player 1 as 0
        let currentPlayer = -1;
        window.num = 0;

        //allows player to place as many tiles as they have rolled
        function changeSprite(img) {
            if (window.num === 0) {return}
            if (!img.src.endsWith("sprites/black.png")) {return}

            switch (currentPlayer % 4) {
                case 0:
                    img.src = "sprites/red.png";
                    break;
                case 1:
                    img.src = "sprites/blue.png";
                    break;
                case 2:
                    img.src = "sprites/green.png";
                    break;
                case 3:
                    img.src = "sprites/yellow.png";
                    break;
            }

            window.num --;
            if (window.num === 0) {changePlayer()}
        }

        //changes player and rolls dice
        async function changePlayer() {
            currentPlayer++;

            if (window.box) {
                const result = await window.box.roll("1d6");
                window.num = result[0].value;
                $("#p" + String(currentPlayer % 4 + 1)).find("." + String(window.num)).append("|");
            }
        }
    </script>
    <script type="module">
        import DiceBox from "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/dice-box.es.js";

        window.box = new DiceBox({
            assetPath: "assets/",
            origin: "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/",
            container: "#dice",
            theme: "rock",
            themeColor: "#547892",
            externalThemes: {
                rock: "https://www.unpkg.com/@3d-dice/theme-rock@0.2.0",
            },
            scale: 16,
            offscreen: true,
            spinForce: 6,
        });

        await window.box.init();
        $("#dice > canvas").height(204).width(388);
        changePlayer();
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .row {
            margin: 0;
            height: 48px;
        }

        .img {
            margin: 0;
            height: 48px;
            width: 48px;
            transform-origin: center center;
        }

        #game {
            margin: 5px;
            position: absolute;
            width: 768px;
        }

        #other {
            margin: 5px;
            position: absolute;
            left: 778px;
        }

        #dice {
            height: 204px;
            width: 388px;
            border: 1px solid black;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 32px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
            width: 48px;
            align-content: baseline;
        }

        th {
            text-align: center;
        }

        .counting {
            height: 72px;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="other">
        <div id="p1">
            <table>
                <tr>
                    <th>I</th>
                    <th>II</th>
                    <th>III</th>
                    <th>IV</th>
                    <th>V</th>
                    <th>VI</th>
                </tr>
                <tr class="counting">
                    <td class="1"></td>
                    <td class="2"></td>
                    <td class="3"></td>
                    <td class="4"></td>
                    <td class="5"></td>
                    <td class="6"></td>
                </tr>
            </table>
        </div>
        <div id="p2">

                <tr>
                    <th>I</th>
                    <th>II</th>
                    <th>III</th>
                    <th>IV</th>
                    <th>V</th>
                    <th>VI</th>
                </tr>
                <tr class="counting">
                    <td class="1"></td>
                    <td class="2"></td>
                    <td class="3"></td>
                    <td class="4"></td>
                    <td class="5"></td>
                    <td class="6"></td>
                </tr>
            </table>
        </div>
        <div id="p3">
            <table>
                <tr>
                    <th>I</th>
                    <th>II</th>
                    <th>III</th>
                    <th>IV</th>
                    <th>V</th>

                </tr>
                <tr class="counting">

        </div>
        <div id="p4">

                <tr>
                    <th>I</th>

                    <th>IV</th>

                </tr>
                <tr class="counting">
