<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Territory</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script defer>
        window.onload = () => {
            for (let i = 0; i < 16; i++) {
                let row = $("<div>", {class: "row"});
                for (let j = 0; j < 16; j++) {
                    let img = $("<img>", {
                        class: "img",
                        src: "sprites/black.png",
                    }).on("click", function() {changeSprite(this)});
                    row.append(img);
                }
                $("body").append(row);
            }
        }

        let currentPlayer = 0;

        function changeSprite(img) {
            switch (currentPlayer % 4) {
                case 0:
                    img.src = "sprites/red.png";
                    break;
                case 1:
                    img.src = "sprites/blue.png";
                    break;
                case 2:
                    img.src = "sprites/green.png";
                    break;
                case 3:
                    img.src = "sprites/yellow.png";
                    break;
            }
        }

        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                currentPlayer ++;
            }
        });
    </script>
    <style>
        body {
            margin: 0;
        }

        .row {
            padding: 8px;
            margin: 0;
            height: 16px;
        }

        .img {
            margin: 0 8px 0 8px;
            height: 16px;
            width: 16px;
            transform-origin: center center;
        }

        .img:hover {
            transform: scale(1.5);
        }
    </style>
</head>
<body>

</body>
</html>
