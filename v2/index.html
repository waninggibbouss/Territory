<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Territory</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script defer>
        window.onload = () => {
            for (let i = 0; i < 16; i++) {
                let row = $("<div>", {class: "row"});
                for (let j = 0; j < 16; j++) {
                    let img = $("<img>", {
                        class: "img",
                        src: "sprites/black.png",
                    }).on("click", function() {changeSprite(this)});
                    row.append(img);
                }
                $("#game").append(row);
            }
        }

        let currentPlayer = 0;

        function changeSprite(img) {
            switch (currentPlayer % 4) {
                case 0:
                    img.src = "sprites/red.png";
                    break;
                case 1:
                    img.src = "sprites/blue.png";
                    break;
                case 2:
                    img.src = "sprites/green.png";
                    break;
                case 3:
                    img.src = "sprites/yellow.png";
                    break;
            }
        }

        window.addEventListener("keydown", async (e) => {
            if (e.key === "Enter") {
                currentPlayer++;

                if (window.box) {
                    const result = await window.box.roll("1d6");
                    console.log(result);
                    window.num = result;
                }
            }
        });
    </script>
    <script type="module">
        import DiceBox from '@3d-dice/dice-box';

        window.box = new DiceBox({
            assetPath: "assets/",
            origin: "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/",
            container: "#dice",
            themeColor: "#547892",
            offscreen: false,
            scale: 6,
            enableShadows: false,
            spinForce: 6
        });

        window.box.init().then(() => {
            window.box.roll("1d6");
        }).catch(console.error);
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .row {
            margin: 0;
            height: 48px;
        }

        .img {
            margin: 0;
            height: 48px;
            width: 48px;
            transform-origin: center center;
        }

        #game {
            margin: 5px;
            position: absolute;
            width: 768px;
        }

        #other {
            margin: 5px;
            position: absolute;
            left: 778px;
        }

        #dice {
            height: 206px;
            width: 288px;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 32px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
            width: 48px;
            align-content: baseline;
        }

        th {
            text-align: center;
        }

        .counting {
            height: 72px;
        }
    </style>
</head>

    <div id="other">

        <div id="p3">
